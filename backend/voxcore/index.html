<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoxCore Demo App</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #121212;
            color: #ffffff;
        }
        .container {
            text-align: center;
            padding: 40px;
            border-radius: 12px;
            background: #1e1e1e;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
        }
        h1 { margin-top: 0; color: #4CAF50; }
        .status {
            margin: 20px 0;
            padding: 15px;
            border-radius: 6px;
            background: #2a2a2a;
            font-family: monospace;
            font-size: 1.1em;
            color: #4CAF50;
        }
        button {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            margin-bottom: 10px;
        }
        .btn-connect {
            background: #4CAF50;
            color: white;
        }
        .btn-connect:hover { background: #45a049; }
        
        .btn-disconnect {
            background: #f44336;
            color: white;
            display: none;
        }
        .btn-disconnect:hover { background: #d32f2f; }
        
        /* Simple mic animation */
        .mic-active {
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(76, 175, 80, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(76, 175, 80, 0); }
            100% { box-shadow: 0 0 0 0 rgba(76, 175, 80, 0); }
        }
    </style>
</head>
<body>

    <div class="container" id="app-container">
        <h1>VoxCore Voice AI</h1>
        
        <!-- Auth Section -->
        <div id="auth-section" style="margin-bottom: 20px;">
            <input type="password" id="api-key-input" placeholder="Enter Master API Key" style="width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 4px; border: 1px solid #555; background: #333; color: white;">
        </div>

        <div class="status" id="status">Status: Disconnected</div>
        <button class="btn-connect" id="btn-connect">Connect Microphone</button>
        <button class="btn-disconnect" id="btn-disconnect">Disconnect</button>
    </div>

    <!-- Import the official VoxCore Client SDK -->
    <script src="/static/voxcore-client.js?v=2"></script>

    <script>
        const btnConnect = document.getElementById('btn-connect');
        const btnDisconnect = document.getElementById('btn-disconnect');
        const statusDiv = document.getElementById('status');
        const appContainer = document.getElementById('app-container');

        let client = null;

        btnConnect.addEventListener('click', async () => {
            const apiKey = document.getElementById('api-key-input').value.trim();
            if (!apiKey) {
                statusDiv.innerText = "Error: Please enter an API Key.";
                return;
            }

            btnConnect.disabled = true;
            btnConnect.innerText = "Authenticating...";
            
            try {
                // 1. Fetch Auth Ticket
                const authRes = await fetch('/v1/auth/ticket', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${apiKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ session_id: "demo_user_1" })
                });

                if (!authRes.ok) {
                    throw new Error(`Auth failed: ${authRes.statusText}`);
                }

                const { ticket } = await authRes.json();
                
                // 2. Connect WebSocket using the ephemeral ticket
                btnConnect.innerText = "Connecting...";
                const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                const wsUrl = `${protocol}//${window.location.host}/v1/voice?ticket=${ticket}`;
                
                client = new VoxCoreClient(wsUrl);
                
                // Register a dummy tool for testing
                client.registerTool({
                    name: "get_weather",
                    description: "Get the current weather for a city.",
                    parameters: {
                        type: "object",
                        properties: {
                            city: { type: "string", description: "The city to get weather for" }
                        },
                        required: ["city"]
                    },
                    execute: async (args) => {
                        console.log("[Tool Execution] get_weather called with args:", args);
                        return `The weather in ${args.city} is sunny and 75 degrees.`;
                    }
                });

                // Bind UI events to the SDK callbacks
                client.onStateChange = (state) => {
                    statusDiv.innerText = `Status: ${state}`;
                    
                    if (state.includes("Connected")) {
                        btnConnect.style.display = 'none';
                        btnDisconnect.style.display = 'block';
                        document.getElementById('auth-section').style.display = 'none';
                        appContainer.classList.add("mic-active");
                    } else if (state.includes("Disconnected")) {
                        btnConnect.style.display = 'block';
                        btnConnect.disabled = false;
                        btnConnect.innerText = "Connect Microphone";
                        btnDisconnect.style.display = 'none';
                        document.getElementById('auth-section').style.display = 'block';
                        appContainer.classList.remove("mic-active");
                    }
                };

                client.onAiSpeaking = (isSpeaking) => {
                    if (isSpeaking) {
                        appContainer.classList.remove("mic-active");
                    } else {
                        appContainer.classList.add("mic-active");
                    }
                };

                client.onError = (err) => {
                    console.error("VoxCore Error:", err);
                    statusDiv.innerText = "Error: " + err.message;
                };

                await client.connect();
                
            } catch (err) {
                statusDiv.innerText = "Error: " + err.message;
                btnConnect.disabled = false;
                btnConnect.innerText = "Connect Microphone";
            }
        });

        btnDisconnect.addEventListener('click', () => {
            if (client) {
                client.disconnect();
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoxCore Separate Client Demo</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            transition: background-color 0.5s;
        }
        .container {
            background: #1e293b;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        h1 { margin-top: 0; color: #38bdf8; }
        .status {
            margin: 20px 0;
            padding: 10px;
            background: #334155;
            border-radius: 6px;
            font-family: monospace;
            color: #10b981;
        }
        .tool-logs {
            margin-top: 20px;
            padding: 10px;
            background: #000;
            border-radius: 6px;
            font-family: monospace;
            color: #e2e8f0;
            text-align: left;
            height: 150px;
            overflow-y: auto;
            font-size: 0.9em;
        }
        .transcript-box {
            margin-top: 15px;
            padding: 10px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 6px;
            font-style: italic;
            color: #cbd5e1;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .volume-container {
            width: 100%;
            height: 8px;
            background: #334155;
            border-radius: 4px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        .volume-bar {
            height: 100%;
            width: 0%;
            background: #10b981;
            transition: width 0.1s ease-out, background-color 0.2s;
        }
        select {
            background: #334155;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 6px;
            font-size: 14px;
            width: 100%;
            margin-bottom: 20px;
        }
        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 10px;
            font-weight: bold;
        }
        button:hover { background: #2563eb; }
        .btn-disconnect { background: #ef4444; display: none; }
        .btn-disconnect:hover { background: #dc2626; }
        .mic-active { animation: pulse 1.5s infinite; }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(56, 189, 248, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(56, 189, 248, 0); }
            100% { box-shadow: 0 0 0 0 rgba(56, 189, 248, 0); }
        }
    </style>
</head>
<body>

    <div class="container" id="app">
        <h1>External Client Demo</h1>
        <p>This runs on a completely separate port from VoxCore.</p>
        
        <div class="status" id="status">Status: Disconnected</div>
        
        <div class="volume-container">
            <div class="volume-bar" id="volume-bar"></div>
        </div>
        
        <button id="btn-connect">Start Voice Session</button>
        <button id="btn-disconnect" class="btn-disconnect">End Session</button>

        <div class="transcript-box" id="transcript-user">
            [ You said... ]
        </div>
        
        <div class="transcript-box" id="transcript-ai" style="color: #38bdf8;">
            [ AI responding... ]
        </div>
        
        <div style="margin-top: 20px;">
            <label for="speaker-select" style="display:block; margin-bottom: 5px; font-size: 14px; color: #94a3b8;">Choose AI Voice:</label>
            <select id="speaker-select">
                <option value="0">Voice 0 (Default)</option>
                <option value="15">Voice 15 (American Female)</option>
                <option value="42">Voice 42 (American Male)</option>
                <option value="100">Voice 100 (Deep Male)</option>
                <option value="500">Voice 500 (British Accent)</option>
                <option value="903">Voice 903 (Young Female)</option>
            </select>
        </div>

        <div class="tool-logs" id="logs">
            > Tool execution logs will appear here...
        </div>
    </div>

    <!-- Fetch the SDK directly from the VoxCore backend server -->
    <script src="http://localhost:8000/static/voxcore-client.js"></script>

    <script>
        const btnConnect = document.getElementById('btn-connect');
        const btnDisconnect = document.getElementById('btn-disconnect');
        const statusDiv = document.getElementById('status');
        const logsDiv = document.getElementById('logs');
        const app = document.getElementById('app');
        const volumeBar = document.getElementById('volume-bar');
        const transcriptUser = document.getElementById('transcript-user');
        const transcriptAi = document.getElementById('transcript-ai');
        const speakerSelect = document.getElementById('speaker-select');

        // Allow changing voice instantly while connected
        speakerSelect.addEventListener('change', (e) => {
            if (client) {
                client.setSpeaker(parseInt(e.target.value));
                logEvent(`Changed voice to Speaker ID: ${e.target.value}`);
            }
        });

        function logEvent(msg) {
            logsDiv.innerHTML += `<div>> ${msg}</div>`;
            logsDiv.scrollTop = logsDiv.scrollHeight;
        }

        let client = null;

        btnConnect.addEventListener('click', async () => {
            btnConnect.disabled = true;
            btnConnect.innerText = "Connecting...";
            
            // Connect to VoxCore Backend on port 8000
            client = new VoxCoreClient("ws://localhost:8000/v1/voice");

            // ==========================================
            // TOOL REGISTRATION (Client Logic)
            // ==========================================
            
            // Tool 1: Change UI Background Color (Visual Action)
            client.registerTool({
                name: "change_background_color",
                description: "Changes the background color of the web application.",
                parameters: {
                    type: "object",
                    properties: { color: { type: "string", description: "A valid CSS color string (e.g. 'red', '#ff0000')" } },
                    required: ["color"]
                },
                execute: async (args) => {
                    logEvent(`Executed: change_background_color(${args.color})`);
                    document.body.style.backgroundColor = args.color;
                    return `Successfully changed the background color to ${args.color}.`;
                }
            });

            // Tool 2: Get User's Current City (Tool Chaining Step 1)
            client.registerTool({
                name: "get_current_city",
                description: "Returns the user's current city.",
                parameters: { type: "object", properties: {} },
                execute: async () => {
                    logEvent(`Executed: get_current_city()`);
                    // Simulate fetching from GPS
                    return { city: "Seattle", state: "WA" };
                }
            });

            // Tool 3: Get Weather (Tool Chaining Step 2)
            client.registerTool({
                name: "get_weather",
                description: "Gets the weather for a specific city.",
                parameters: {
                    type: "object",
                    properties: { city: { type: "string" } },
                    required: ["city"]
                },
                execute: async (args) => {
                    logEvent(`Executed: get_weather(${args.city})`);
                    return `The weather in ${args.city} is raining heavily.`;
                }
            });

            // Tool 4: Get Stock Price (Simultaneous Tool Call Test)
            client.registerTool({
                name: "get_stock_price",
                description: "Gets the current price for a stock ticker.",
                parameters: {
                    type: "object",
                    properties: { ticker: { type: "string" } },
                    required: ["ticker"]
                },
                execute: async (args) => {
                    logEvent(`Executed: get_stock_price(${args.ticker})`);
                    return `The stock price of ${args.ticker} is $150.25.`;
                }
            });

            // ==========================================

            client.onStateChange = (state) => {
                statusDiv.innerText = `Status: ${state}`;
                if (state.includes("Connected")) {
                    btnConnect.style.display = 'none';
                    btnDisconnect.style.display = 'block';
                    app.classList.add("mic-active");
                    
                    // Immediately apply selected speaker on connection
                    client.setSpeaker(parseInt(speakerSelect.value));
                } else if (state.includes("Disconnected")) {
                    btnConnect.style.display = 'block';
                    btnConnect.disabled = false;
                    btnConnect.innerText = "Start Voice Session";
                    btnDisconnect.style.display = 'none';
                    app.classList.remove("mic-active");
                    volumeBar.style.width = '0%';
                }
            };

            client.onAiSpeaking = (isSpeaking) => {
                isSpeaking ? app.classList.remove("mic-active") : app.classList.add("mic-active");
            };
            
            client.onVolumeChange = (volume) => {
                const percent = Math.min(100, Math.round(volume * 100));
                volumeBar.style.width = `${percent}%`;
                // Change color if speaking loudly
                if (percent > 60) volumeBar.style.backgroundColor = '#ef4444';
                else if (percent > 30) volumeBar.style.backgroundColor = '#f59e0b';
                else volumeBar.style.backgroundColor = '#10b981';
            };
            
            client.onUserTranscription = (text) => {
                transcriptUser.innerText = `"${text}"`;
            };
            
            client.onAiTranscription = (text) => {
                transcriptAi.innerText = text;
            };

            client.onError = (err) => {
                logEvent(`Error: ${err.message}`);
                statusDiv.innerText = "Error: " + err.message;
            };

            await client.connect();
        });

        btnDisconnect.addEventListener('click', () => {
            if (client) client.disconnect();
        });
    </script>
</body>
</html>
